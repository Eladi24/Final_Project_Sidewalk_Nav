# -----------------------------------------------------------------------
# default.yaml — single source of truth for all tunable values.
# All thresholds in the pipeline are read from here; never hard-code them.
# -----------------------------------------------------------------------

paths:
  cache_dir: data/cache           # Stage A writes here; Stage B reads here
  output_dir: output              # annotated video output
  intrinsics: calibration/intrinsics.json

camera:
  intrinsics: calibration/intrinsics.json
  height_m: 1.5    # approximate camera height above ground in metres.
                   # Typical values: 1.4 m (short person holding phone) – 1.8 m (tall).
  metric_scale_factor: 0.3  # Depth scale correction for DepthAnythingV2 on this camera.
                            # The model outputs distances ~3-4x larger than reality on this lens.
                            # Calibration: stand a known distance D_real (e.g. 2 m) from a flat wall,
                            # run the pipeline, note the reported distance D_reported, then set
                            # metric_scale_factor = D_real / D_reported.
                            # Current value 0.3 derived from: pole at ~1.5 m reported as ~5 m → 1.5/5 = 0.30.

# RANSAC ground-plane fitting (src/geometry/ground_plane.py)
# Iteration count formula: N = ceil(log(1-p) / log(1-(1-e)^s))
#   p=0.99 (desired success probability), e=0.5 (outlier fraction), s=3 (sample size)
ground_plane:
  ransac_distance_threshold: 0.05   # meters — inlier distance to fitted plane
  ransac_max_iterations: 200        # formula: log(1-p)/log(1-(1-e)^s)
                                    # p=0.99, e=0.5 outlier rate, s=3 → only 35 iters needed
                                    # 200 gives large safety margin with no quality loss
  ransac_min_inliers: 100           # minimum inliers to accept a hypothesis
  ransac_max_input_points: 15000    # subsample before RANSAC — a flat plane needs only
                                    # a few thousand well-distributed points to fit reliably

# Obstacle detection (src/obstacles/detector.py)
obstacles:
  height_threshold: 0.15            # meters above ground plane → raised to ignore curb stones
  dbscan_eps: 0.5                   # neighborhood radius in meters.
                                    # Reverted to 0.5 for stable full-scale clustering.
  dbscan_min_samples: 20            # DBSCAN core-point density requirement.
                                    # Higher value = noisier environment needs denser
                                    # cores, reducing spurious micro-clusters from
                                    # vegetation texture and road markings.
  min_cluster_size: 20              # discard clusters smaller than this (noise).
                                    # 20 is the minimum for catching thin tree trunks
                                    # and utility poles (~30 cm diameter) at 3-8 m while
                                    # still rejecting single-pixel noise fragments.
  max_candidate_points: 15000       # hard cap on points fed to DBSCAN per frame (lowered for 5x speedup)
  max_obstacle_distance_m: 12.0     # discard obstacle clusters farther than this.
                                    # With metric_scale_factor=0.3, physical distances
                                    # are now calibrated.  Beyond 12 m obstacles are not
                                    # actionable for a walking pedestrian and far clusters
                                    # tend to be road-surface / vegetation false positives.

# Sidewalk corridor (src/segmentation/boundary.py)
corridor:
  boundary_poly_degree: 2           # polynomial degree for left/right boundary fit
  corridor_margin: 20               # pixel margin inset from the raw mask edge
  min_boundary_coverage: 0.05       # min pixel fraction for sidewalk-only mask (class 1)
                                    # to be used for boundary extraction instead of the
                                    # combined mask.  Israeli cobblestone sidewalks are
                                    # misclassified as class 0 (road), so class 1 coverage
                                    # is typically only 3–8%.  5% lets us use the class-1
                                    # boundary when it exists, while the left-anchor logic
                                    # in visual_boundary handles the remaining cases.
  boundary_ema_alpha: 0.2           # temporal EMA weight for new boundary observation.
                                    # 0.2 ≈ 5-frame effective window.  Raised from 0.1
                                    # so the corridor adapts faster to sidewalk curves
                                    # while still suppressing single-frame jitter.
  max_boundary_jump_px: 60          # if left OR right boundary shifts more than this many
                                    # pixels at the frame mid-row relative to the previous
                                    # frame, treat this frame's boundary as unreliable.
                                    # Raised from 40 so legitimate curve transitions on
                                    # a winding sidewalk are not rejected as transients.
  max_corridor_width_m: 3.0         # physical cap on corridor width in metres.
                                    # Applied at render and search time via max_width_px
                                    # = max_corridor_width_m × fx / max(Z_row, z_floor_m).
                                    # Israeli sidewalks range from 1.5 m (narrow) to 4 m
                                    # (wide boulevard).  3.0 m covers most while keeping
                                    # the corridor off a typical 6 m road lane.
  z_floor_m: 5.0                    # minimum ground-plane depth (metres) used when
                                    # computing max_width_px per row.  Without this floor,
                                    # at near rows where Z_row ≈ 1.5 m the cap becomes
                                    # 2.5 × fx / 1.5 ≈ 1300 px > image width = inactive.
                                    # With z_floor = 5 m: max_width_px ≤ 2.5×780/5 = 390 px
                                    # at all rows → corridor bounded to ≤ 2.5 m always.

# Temporal tracking (src/obstacles/tracker.py)
tracking:
  ema_alpha: 0.4                    # EMA weight for new observation (0=ignore, 1=replace)
  max_lost_frames: 10               # frames before a lost track is pruned
  max_match_distance_m: 2.0         # max 3D centroid distance to associate to a track

# Stage A — Depth Anything V2 metric (src/depth/depth_estimator.py)
depth:
  model_name: "depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf"
  input_resolution: [518, 518]      # model's expected input (H, W)

# Stage A — SegFormer (src/segmentation/sidewalk_seg.py)
segmentation:
  model_name: "nvidia/segformer-b2-finetuned-cityscapes-1024-1024"
  # Cityscapes classes: 0=road, 1=sidewalk, 2=building, 3=wall, 4=fence ...
  # Include class 0 (road) because cobblestone/brick sidewalks are often
  # misclassified as road by a model trained on smooth European pavement.
  traversable_class_ids: [0, 1]

# Output / overlay rendering (src/output/overlay.py)
output:
  max_display_obstacles: 5    # show only the N nearest obstacles on screen.
                              # Capped at 5 to prevent label overlap.  The 5
                              # nearest obstacles are always the most actionable.

# Performance — memory reduction for Stage B on low-RAM machines
performance:
  spatial_stride: 2     # downsample depth/mask/frame by this factor before geometry.
                        # 1 = full resolution (needs ~16 GB for 1080p)
                        # 2 = half res, 4× less memory — recommended for 1080p on ≤8 GB RAM
                        # 4 = quarter res, if RAM is still tight
                        # DBSCAN and RANSAC produce metric-space results unchanged by stride.
