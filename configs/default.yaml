# -----------------------------------------------------------------------
# default.yaml — single source of truth for all tunable values.
# All thresholds in the pipeline are read from here; never hard-code them.
# -----------------------------------------------------------------------

paths:
  cache_dir: data/cache           # Stage A writes here; Stage B reads here
  output_dir: output              # annotated video output
  intrinsics: calibration/intrinsics.json

camera:
  intrinsics: calibration/intrinsics.json
  height_m: 1.5    # approximate camera height above ground in metres.
                   # Used as a fallback when the ground plane hasn't been fitted yet
                   # (first frame) for the depth-based row-width filter in pipeline.py.
                   # Typical values: 1.4 m (short person holding phone) – 1.8 m (tall).
  metric_scale_factor: 1.0  # Reverted: the scale correction broke DBSCAN and corridor logic.
                            # Distances will read larger, but detection will be completely stable.

# RANSAC ground-plane fitting (src/geometry/ground_plane.py)
# Iteration count formula: N = ceil(log(1-p) / log(1-(1-e)^s))
#   p=0.99 (desired success probability), e=0.5 (outlier fraction), s=3 (sample size)
ground_plane:
  ransac_distance_threshold: 0.05   # meters — inlier distance to fitted plane
  ransac_max_iterations: 200        # formula: log(1-p)/log(1-(1-e)^s)
                                    # p=0.99, e=0.5 outlier rate, s=3 → only 35 iters needed
                                    # 200 gives large safety margin with no quality loss
  ransac_min_inliers: 100           # minimum inliers to accept a hypothesis
  ransac_max_input_points: 15000    # subsample before RANSAC — a flat plane needs only
                                    # a few thousand well-distributed points to fit reliably

# Obstacle detection (src/obstacles/detector.py)
obstacles:
  height_threshold: 0.15            # meters above ground plane → raised to ignore curb stones
  dbscan_eps: 0.5                   # neighborhood radius in meters.
                                    # Reverted to 0.5 for stable full-scale clustering.
  dbscan_min_samples: 10            # DBSCAN core-point density requirement.
                                    # Lowered from 10 for the same stride=2 reason.
  min_cluster_size: 15              # discard clusters smaller than this (noise).
                                    # At stride=2 a thin pole at 8 m subtends only
                                    # ~10 pixels; after depth noise filtering the
                                    # surviving cluster can be as small as 5 points.
  max_candidate_points: 15000       # hard cap on points fed to DBSCAN per frame (lowered for 5x speedup)

# Sidewalk corridor (src/segmentation/boundary.py)
corridor:
  boundary_poly_degree: 2           # polynomial degree for left/right boundary fit
  corridor_margin: 20               # pixel margin inset from the raw mask edge
  min_boundary_coverage: 0.25       # min pixel fraction for sidewalk-only mask (class 1)
                                    # Reverted to 0.25 to aggressively prevent the path
                                    # from bleeding into the car road.
  boundary_ema_alpha: 0.1           # temporal EMA weight for new boundary observation.
                                    # Lower = more smoothing / longer memory for gaps
  max_boundary_jump_px: 40          # if left OR right boundary shifts more than this many
                                    # pixels at the frame mid-row relative to the previous
                                    # frame, treat this frame's boundary as unreliable
                                    # Tightened back to 40 so the tracker successfully ignores passing cars.
  max_corridor_width_m: 3.5         # hard physical cap on corridor width in metres.
                                    # Applied to the VISUAL fill only (green overlay).
                                    # Obstacle search uses the full uncapped boundary so
                                    # parked cars and poles at the sidewalk edge are caught.
                                    # Standard Israeli sidewalk: 1.5 – 3 m; 3.5 m leaves
                                    # headroom for wider paths across 13 videos.

# Temporal tracking (src/obstacles/tracker.py)
tracking:
  ema_alpha: 0.4                    # EMA weight for new observation (0=ignore, 1=replace)
  max_lost_frames: 10               # frames before a lost track is pruned
  max_match_distance_m: 2.0         # max 3D centroid distance to associate to a track

# Stage A — Depth Anything V2 metric (src/depth/depth_estimator.py)
depth:
  model_name: "depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf"
  input_resolution: [518, 518]      # model's expected input (H, W)

# Stage A — SegFormer (src/segmentation/sidewalk_seg.py)
segmentation:
  model_name: "nvidia/segformer-b2-finetuned-cityscapes-1024-1024"
  # Cityscapes classes: 0=road, 1=sidewalk, 2=building, 3=wall, 4=fence ...
  # Include class 0 (road) because cobblestone/brick sidewalks are often
  # misclassified as road by a model trained on smooth European pavement.
  traversable_class_ids: [0, 1]

# Performance — memory reduction for Stage B on low-RAM machines
performance:
  spatial_stride: 2     # downsample depth/mask/frame by this factor before geometry.
                        # 1 = full resolution (needs ~16 GB for 1080p)
                        # 2 = half res, 4× less memory — recommended for 1080p on ≤8 GB RAM
                        # 4 = quarter res, if RAM is still tight
                        # DBSCAN and RANSAC produce metric-space results unchanged by stride.
